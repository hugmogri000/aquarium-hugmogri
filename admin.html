<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>订单管理 | Hugmogri Aquarium</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="stylesheet" href="./site.css?v=20260622-admin-2">
</head>
<body class="admin-body">
  <main class="admin-shell">
    <section class="admin-header">
      <div>
        <p class="eyebrow">管理后台</p>
        <h1>订单管理</h1>
        <p class="hero-summary">查看客户订单、支付状态，并录入或更新运单号。</p>
      </div>
    </section>

    <section class="admin-panel">
      <form class="admin-filter" data-admin-filter autocomplete="off">
        <label class="customer-field">
          <span>管理口令</span>
          <input type="password" name="token" required>
        </label>
        <label class="customer-field">
          <span>手机号</span>
          <input type="tel" name="phone">
        </label>
        <label class="customer-field">
          <span>支付状态</span>
          <select name="paymentStatus">
            <option value="">全部</option>
            <option value="pending">待支付</option>
            <option value="paid">已支付</option>
          </select>
        </label>
        <button class="button" type="submit">加载订单</button>
      </form>
      <p class="payment-form-alert" data-admin-alert hidden></p>
    </section>

    <section class="admin-list" data-admin-list></section>
  </main>
  <script src="./admin.js?v=20260622-admin-2" defer></script>
</body>
</html>
